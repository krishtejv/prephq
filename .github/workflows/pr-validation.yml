name: Pull Request Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd server && npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build Frontend (Verify compiler safety)
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start Servers in Background
        run: |
          # Start Backend
          cd server
          export JWT_SECRET=test_jwt_secret_12345
          npm start &
          
          # Start Frontend (Vite)
          cd ..
          npm run dev &
          
          # Wait for both ports to be ready
          npx wait-on tcp:localhost:5001 tcp:localhost:5173 --timeout 45000
        env:
          NODE_ENV: test

      - name: Run Playwright E2E Tests
        run: npx playwright test
