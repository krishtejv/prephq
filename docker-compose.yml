version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prephq-backend
    ports:
      - "5001:5001"
    volumes:
      # Maps local directory ./server/data to container storage path to keep database data safe across updates
      - ./server/data:/usr/src/app/data
    restart: unless-stopped
    environment:
      - PORT=5001
      - NODE_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prephq-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
