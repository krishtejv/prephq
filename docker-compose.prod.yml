version: '3.8'

services:
  backend:
    # Replace <github-username> with your actual GitHub username
    image: ghcr.io/<github-username>/prephq-backend:latest
    container_name: prephq-backend
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    volumes:
      # Maps local directory server/data to container path to persist your SQLite database
      - ./server/data:/usr/src/app/data
    restart: unless-stopped
    environment:
      - PORT=5001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:8080}

  frontend:
    # Replace <github-username> with your actual GitHub username
    image: ghcr.io/<github-username>/prephq-frontend:latest
    container_name: prephq-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Watchtower coordinates continuous deployment (CD) by automatically checking for
  # updated images on GHCR and restarting containers gracefully when they change.
  watchtower:
    image: containrrr/watchtower
    container_name: prephq-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # If your package images are Private, uncomment this to mount your local docker login config
      # so Watchtower can authenticate to GHCR:
      # - ~/.docker/config.json:/config.json:ro
    # Check for new images every 300 seconds (5 minutes) and clean up old image layers
    command: --interval 300 --cleanup
    restart: unless-stopped
